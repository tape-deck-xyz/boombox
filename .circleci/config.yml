version: 2.1
# CI pipeline: build, lint, test, test-e2e, release
#
# Deno is pinned so `deno fmt --check` / lint match developer installs (see README or run `deno --version`).
# Bump DENO_VERSION when upgrading tooling repo-wide.

commands:
  install_deno:
    steps:
      - run:
          name: Install Deno
          command: |
            set -euo pipefail
            DENO_VERSION="${DENO_VERSION:-2.7.7}"
            curl -fsSL https://deno.land/install.sh | sh -s "v${DENO_VERSION}"
            echo 'export DENO_INSTALL="$HOME/.deno"' >> "$BASH_ENV"
            echo 'export PATH="$DENO_INSTALL/bin:$PATH"' >> "$BASH_ENV"

jobs:
  build:
    docker:
      - image: cimg/base:2024.01
    steps:
      - checkout
      - install_deno
      - run:
          name: Build
          command: mkdir build && deno task build

  test:
    docker:
      - image: cimg/base:2024.01
    steps:
      - checkout
      - install_deno
      - run:
          name: Test
          command: deno task test:coverage:ci

  test-e2e:
    docker:
      - image: mcr.microsoft.com/playwright:v1.57.0-jammy
    steps:
      - checkout
      - run:
          name: Install unzip
          command: |
            apt-get update && apt-get install -y unzip
      - install_deno
      - run:
          name: Install dependencies
          command: npm ci
      - run:
          name: Build
          command: mkdir -p build && deno task build
      - run:
          name: E2E tests
          command: sh scripts/run-e2e.sh

  lint:
    docker:
      - image: cimg/base:2024.01
    steps:
      - checkout
      - install_deno
      - run:
          name: Lint
          command: deno lint
      - run:
          name: Format check
          command: deno fmt --check

  release:
    docker:
      - image: cimg/base:2024.01
    steps:
      - checkout
      - install_deno
      - run:
          name: Prepare git for release
          command: |
            git fetch --unshallow --tags origin main || git fetch --tags origin main
            git checkout -B main "$CIRCLE_SHA1"
            git config user.name "circleci-release-bot"
            git config user.email "circleci-release-bot@users.noreply.github.com"

            PUSH_TOKEN="${GITHUB_TOKEN:-${GH_TOKEN:-}}"
            if [ -n "$PUSH_TOKEN" ]; then
              # Use the real clone URL (GitHub org/repo). CIRCLE_PROJECT_USERNAME /
              # CIRCLE_PROJECT_REPONAME are CircleCI slugs and can differ (e.g.
              # tape-deck/BoomBox vs github.com/tape-deck-xyz/boombox), which breaks git and the API.
              REPO_URL="${CIRCLE_REPOSITORY_URL:-$(git config --get remote.origin.url)}"
              REPO_URL="${REPO_URL%.git}"
              case "$REPO_URL" in
                git@github.com:*)
                  SLUG="${REPO_URL#git@github.com:}" ;;
                *github.com/*)
                  SLUG="${REPO_URL##*github.com/}" ;;
                *)
                  SLUG="${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}" ;;
              esac
              git remote set-url origin "https://x-access-token:${PUSH_TOKEN}@github.com/${SLUG}.git"
            fi
      - run:
          name: Bump version, create release PR, tag, and push
          command: bash scripts/circleci-release.sh

workflows:
  build_and_test:
    jobs:
      - build
      - lint
      - test:
          requires:
            - build
      - test-e2e:
          requires:
            - build
      - release:
          requires:
            - test
            - test-e2e
            - lint
          filters:
            branches:
              only: main
